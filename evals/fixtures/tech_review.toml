[input]
raw_transcript = """
张三：好，今天我们评审一下新的缓存方案，大家都看过方案文档了吗？
李四：看了，我觉得 Redis 集群方案总体可行，但需要重点考虑数据一致性问题，尤其是在节点故障时。
王五：我这边关注的是性能，我们现在的 QPS 大概是两万，Redis 应该没问题。
张三：好，那我们就决定采用 Redis 集群方案。李四，你负责把方案细化，下周五之前提交详细设计文档。
李四：没问题。
张三：王五，你这边做一下压测，周三出结果，我们好做最终决策。
王五：好的，我来安排。
张三：那今天就到这里，下周继续跟进。
"""

